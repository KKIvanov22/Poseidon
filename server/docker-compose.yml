services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: poseidon-server:dev
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB:-poseidon};Username=${POSTGRES_APP_USER:-poseidon_app};Password=${POSTGRES_APP_PASSWORD:-poseidon_app_dev_password}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-poseidon}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-poseidon_admin}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-poseidon_admin_dev_password}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-poseidon_app}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-poseidon_app_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
