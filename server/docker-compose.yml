services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: poseidon-server:dev
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
